spring.application.name=schneaggchatv3server

#Mongodb config
spring.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.mongodb.database=db
spring.data.mongodb.auto-index-creation=true

logging.level.org.springframework.web=DEBUG

logging.level.org.springframework.core.env=DEBUG
logging.level.org.springframework.boot.context.config=DEBUG

#Json web token
jwt.secret=${JWT_SECRET}

#Password for Google play test account
defaultaccount.password=${DEFAULTACCOUNT_PASSWORD}

#Email for email verification etc
spring.mail.test-connection=true
spring.mail.username=schneaggchat@gmail.com
spring.mail.password=blablabla
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true