<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schneaggchat V3 - Seite nicht gefunden</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
        }
        
        .error-container {
            text-align: center;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .error-icon {
            font-size: 6rem;
            color: #ef4444;
            margin-bottom: 1.5rem;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .error-code {
            font-size: 4rem;
            font-weight: 700;
            color: #ef4444;
            margin-bottom: 1rem;
            text-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        .error-title {
            font-size: 2rem;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 1rem;
        }
        
        .error-message {
            font-size: 1.1rem;
            color: #cbd5e1;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .error-path {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 2rem;
            font-family: 'Courier New', monospace;
            color: #fca5a5;
            word-break: break-all;
        }
        
        .back-home-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        
        .back-home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }
        
        .back-home-btn i {
            font-size: 1.1rem;
        }
        
        @media (max-width: 768px) {
            .error-container {
                padding: 2rem;
                margin: 1rem;
            }
            
            .error-code {
                font-size: 3rem;
            }
            
            .error-title {
                font-size: 1.5rem;
            }
            
            .error-icon {
                font-size: 4rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div id="header-container"></div>

    <!-- Error Section -->
    <section class="error-page">
        <div class="error-container">
            <div class="error-icon">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            
            <div class="error-code">404</div>
            
            <h1 class="error-title">Seite nicht gefunden</h1>
            
            <p class="error-message">
                Die von Ihnen angeforderte Seite konnte leider nicht gefunden werden. 
                Möglicherweise wurde die Seite entfernt, der Name wurde geändert oder sie ist vorübergehend nicht verfügbar.
            </p>
            
            <div class="error-path" th:if="${requestedPath}">
                <strong>Versuchte Route:</strong><br>
                <span th:text="${requestedPath}">/unbekannte-route</span>
            </div>
            
            <a href="/" class="back-home-btn">
                <i class="fa-solid fa-arrow-left"></i>
                Zurück zur Startseite
            </a>
        </div>
    </section>

    <!-- Footer -->
    <div id="footer-container"></div>

    <script src="/js/header_footer.js"></script>
    
    <script>
        // Add some interactive effects
        document.addEventListener('DOMContentLoaded', function() {
            const errorIcon = document.querySelector('.error-icon');
            const errorContainer = document.querySelector('.error-container');
            
            // Add entrance animation
            errorContainer.style.opacity = '0';
            errorContainer.style.transform = 'translateY(30px)';
            
            setTimeout(() => {
                errorContainer.style.transition = 'all 0.6s ease';
                errorContainer.style.opacity = '1';
                errorContainer.style.transform = 'translateY(0)';
            }, 100);
            
            // Add hover effect to error icon
            errorIcon.addEventListener('mouseenter', function() {
                this.style.transform = 'rotate(10deg) scale(1.1)';
            });
            
            errorIcon.addEventListener('mouseleave', function() {
                this.style.transform = 'rotate(0deg) scale(1)';
            });
            
            errorIcon.style.transition = 'transform 0.3s ease';
        });
    </script>
</body>
</html>
